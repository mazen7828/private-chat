<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Private Chat</title>
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/messages.css">
    <link rel="stylesheet" href="css/input.css">
    <link rel="stylesheet" href="css/modals.css">
    <link rel="stylesheet" href="css/reactions.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&family=Noto+Sans+Arabic:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="chat-header">
            <!-- Normal Header View (Search Icon) -->
            <div class="header-normal-view" id="header-normal-view">
                <button class="other-user-name-btn" id="other-user-name-btn">
                    <span id="other-user-name-display">ASMAA</span>
                    <div class="presence-indicator-dot" id="presence-indicator-dot"></div>
                </button>
                <button class="search-trigger-btn" id="search-trigger-btn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <circle cx="11" cy="11" r="8"/>
                        <path d="m21 21-4.35-4.35"/>
                    </svg>
                </button>
            </div>
            
            <!-- Search View (Expanded Search Interface) -->
            <div class="header-search-view" id="header-search-view" style="display: none;">
                <button class="search-back-btn" id="search-back-btn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <path d="M19 12H5M12 19l-7-7 7-7"/>
                    </svg>
                </button>
                <div class="search-input-wrapper">
                    <input 
                        type="text" 
                        id="search-input" 
                        class="search-input" 
                        placeholder="ابحث في الرسائل..."
                        dir="rtl"
                    />
                    <button class="search-clear-btn" id="search-clear-btn" style="display: none;">✕</button>
                </div>
                <div class="search-controls" id="search-controls" style="display: none;">
                    <div class="search-counter" id="search-counter">0 / 0</div>
                    <div class="search-nav-buttons">
                        <button class="search-nav-btn" id="search-prev-btn">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M15 18l-6-6 6-6"/>
                            </svg>
                        </button>
                        <button class="search-nav-btn" id="search-next-btn">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M9 18l6-6-6-6"/>
                            </svg>
                        </button>
                    </div>
                </div>
            </div>
        </header>

        <!-- Chat Area -->
        <main class="chat-area" id="chat-area">
            <div class="messages-container" id="messages-container"></div>
        </main>

        <!-- Reply Preview Bar (shown above input when replying) -->
        <div class="reply-preview-bar" id="reply-preview-bar" style="display: none;">
            <div class="reply-preview-content">
                <div class="reply-preview-text">
                    <div class="reply-preview-label">Replying to <strong id="reply-preview-sender"></strong></div>
                    <div class="reply-preview-message" id="reply-preview-message"></div>
                </div>
                <button class="reply-preview-close" id="reply-preview-close">✕</button>
            </div>
        </div>

        <!-- Input Area / Blocked Area -->
        <footer class="input-area" id="footer-area">
            <!-- Quick Message System - Visible directly in blocked mode -->
            <div class="quick-messages-container" id="quick-messages-container" style="display: none;">
                <div class="quick-main-buttons" id="quick-main-buttons">
                    <button class="quick-main-btn" data-category="common">رسائل سريعة</button>
                    <button class="quick-main-btn" data-category="sweet">كلمات لطيفة</button>
                    <button class="quick-main-btn" data-category="status">ردود جاهزة</button>
                </div>
                <div class="quick-preset-panel" id="quick-preset-panel" style="display: none;">
                    <div class="quick-preset-buttons" id="quick-preset-buttons"></div>
                </div>
            </div>
            
            <div class="input-wrapper" id="input-wrapper">
                <button class="pin-btn" id="pin-btn" style="display: none;">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 17v5"/>
                        <path d="M9 10.76a2 2 0 0 1-1.11 1.79l-1.78.9A2 2 0 0 0 5 15.24V16a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-.76a2 2 0 0 0-1.11-1.79l-1.78-.9A2 2 0 0 1 15 10.76V7a1 1 0 0 1 1-1 2 2 0 0 0 0-4H8a2 2 0 0 0 0 4 1 1 0 0 1 1 1z"/>
                    </svg>
                </button>
                <button class="attach-btn" id="attach-btn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
                    </svg>
                </button>
                <button class="voice-btn" id="voice-btn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
                        <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
                        <line x1="12" y1="19" x2="12" y2="23"/>
                        <line x1="8" y1="23" x2="16" y2="23"/>
                    </svg>
                </button>
                <textarea 
                    id="message-input" 
                    placeholder="Type your message..."
                    rows="1"
                ></textarea>
                <button class="send-btn" id="send-btn" type="button">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/>
                    </svg>
                </button>
                <input type="file" id="file-input" accept="image/*,video/*,audio/*,.pdf,.doc,.docx,.txt" style="display: none;" multiple>
            </div>
            
            <div class="blocked-panel" id="blocked-panel" style="display: none;">
                <div class="blocked-message" id="blocked-message"></div>
                <div class="countdown-container" id="countdown-container">
                    <span class="countdown-label">New day in:</span>
                    <div class="countdown-timer" id="countdown-timer">00:00:00</div>
                </div>
                <button class="final-note-trigger" id="final-note-btn" style="display: none;">
                    Send your Final Note ✨
                </button>
            </div>
        </footer>
    </div>

    <!-- Identity Selection Modal -->
    <div class="modal identity-modal" id="identity-modal">
        <div class="modal-content identity-content">
            <div class="modal-icon">✨</div>
            <h2 class="identity-title">Welcome</h2>
            <p class="identity-subtitle">Who is entering the chat?</p>
            <div class="identity-buttons">
                <button class="identity-btn mazen-btn" id="select-mazen">MAZEN</button>
                <button class="identity-btn asmaa-btn" id="select-asmaa">ASMAA</button>
            </div>
        </div>
    </div>

    <!-- Final Note Modal -->
    <div class="modal" id="final-note-modal">
        <div class="modal-content final-note-content arabic-theme">
            <div class="modal-icon">🌸</div>
            <h2 class="modal-title">اكتب ملاحظاتك أو وصاياك الأخيرة</h2>
            <p class="modal-text">يمكنك كتابة ملاحظات أو رسائل أخيرة للطرف الآخر قبل انتهاء اليوم</p>
            <textarea id="final-note-input" placeholder="اكتب كل نقطة في سطر منفصل..." rows="5" dir="rtl"></textarea>
            <div class="modal-footer-btns">
                <button class="modal-btn cancel-btn" id="final-note-cancel">إلغاء</button>
                <button class="modal-btn" id="final-note-send">إرسال الملاحظات</button>
            </div>
        </div>
    </div>

    <!-- Warning/Info Modal -->
    <div class="modal" id="warning-modal">
        <div class="modal-content">
            <div class="modal-icon" id="warning-icon">⚠️</div>
            <p class="modal-text" id="modal-text"></p>
            <button class="modal-btn" id="modal-close">OK</button>
        </div>
    </div>

    <!-- Reaction Popup -->
    <div class="reaction-popup" id="reaction-popup" style="display: none;">
        <div class="reaction-popup-content">
            <div class="reaction-emojis" id="reaction-emojis"></div>
            <button class="reaction-add-btn" id="reaction-add-btn">إضافة</button>
        </div>
    </div>

    <!-- Presence Status Modal -->
    <div class="modal presence-modal" id="presence-modal">
        <div class="modal-content presence-modal-content">
            <div class="presence-modal-indicator" id="presence-modal-indicator"></div>
            <h2 class="presence-modal-name" id="presence-modal-name">ASMAA</h2>
            <p class="presence-modal-status" id="presence-modal-status">آخر ظهور: اليوم 2:13 AM</p>
        </div>
    </div>

    <!-- Voice Recording Modal -->
    <div class="modal" id="voice-modal">
        <div class="modal-content voice-modal-content">
            <div class="voice-recording-indicator" id="voice-recording-indicator">
                <div class="voice-pulse"></div>
            </div>
            <h2 class="modal-title" id="voice-modal-title">Recording...</h2>
            <div class="voice-timer" id="voice-timer">00:00</div>
            <div class="modal-footer-btns">
                <button class="modal-btn cancel-btn" id="voice-cancel">إلغاء</button>
                <button class="modal-btn" id="voice-send">إرسال</button>
            </div>
        </div>
    </div>

    <!-- Media Preview Modal -->
    <div class="modal" id="media-preview-modal">
        <div class="modal-content media-preview-content">
            <h2 class="modal-title">إرسال الوسائط</h2>
            <div class="media-preview-container" id="media-preview-container"></div>
            <textarea id="media-caption-input" placeholder="أضف تعليق..." rows="2" dir="rtl"></textarea>
            <div class="modal-footer-btns">
                <button class="modal-btn cancel-btn" id="media-preview-cancel">إلغاء</button>
                <button class="modal-btn" id="media-preview-send">إرسال</button>
            </div>
        </div>
    </div>

        <!-- 🔥 Firebase Compat SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>
    <script src="js/firebase.js" defer></script>
    <script src="js/state.js" defer></script>
    <script src="js/elements.js" defer></script>
    <script src="js/search.js" defer></script>
    <script src="js/rendering.js" defer></script>
    <script src="js/presence.js" defer></script>
    <script src="js/uiState.js" defer></script>
    <script src="js/ui.js" defer></script>
    <script src="js/messages.js" defer></script>
    <script src="js/quickMessages.js" defer></script>
    <script src="js/reactionHandlers.js" defer></script>
    <script src="js/media.js" defer></script>
    <script src="js/notifications.js" defer></script>
    <script src="js/events.js" defer></script>
    <script src="js/script.js" defer></script>
</body>
</html>
